<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Dust & Needles</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <span>📻</span> Dust & Needles
        </a>
        <button class="mobile-menu-btn" onclick="toggleMenu()">☰</button>
        <nav>
            <ul id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="playlists.html">Playlists</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2 class="section-title">Drop Us A Line</h2>
        <div class="text-content" style="margin-bottom: 30px;">
            <p>Got a playlist recommendation or want to report a broken link? Let us know!</p>
        </div>
        
        <div class="contact-form">
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="message">Message / Record Request</label>
                    <textarea id="message" rows="5" required placeholder="I would love a playlist for..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Dust & Needles Team. Final Year Project. All Rights Reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
