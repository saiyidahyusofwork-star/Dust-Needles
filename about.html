<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | Dust & Needles</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* Base Setup & Background */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #e5e5e5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Container Kad Utama */
        .about-container {
            background-color: #f7f7f7;
            width: 100%;
            max-width: 900px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 40px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 30px;
            overflow: hidden; /* Supaya bucu footer ikut rounded kotak putih */
        }

        /* GAYA DEKORASI NOTA MUZIK LATAR BELAKANG */
        .music-note {
            position: absolute;
            color: rgba(0, 0, 0, 0.03); /* Kepekatan warna nota (sangat pudar & estetik) */
            pointer-events: none; /* Supaya tak mengganggu cursor bila user klik */
            z-index: 1;
        }
        
        /* Lokasi posisi setiap nota muzik secara rawak */
        .note1 { top: 10%; left: 5%; font-size: 40px; transform: rotate(-15deg); }
        .note2 { top: 75%; left: 8%; font-size: 55px; transform: rotate(20deg); }
        .note3 { top: 15%; right: 10%; font-size: 45px; transform: rotate(10deg); }
        .note4 { top: 45%; left: 45%; font-size: 35px; transform: rotate(-25deg); }
        .note5 { top: 70%; right: 45%; font-size: 50px; transform: rotate(15deg); }

        /* Header Navigation */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 15px;
            position: relative;
            z-index: 2; /* Letak atas nota muzik */
        }

        .logo {
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 26px;
            color: #1a1a1a;
        }

        #nav-links {
            display: flex;
            list-style: none;
        }

        #nav-links li {
            margin-left: 20px;
        }

        #nav-links a {
            text-decoration: none;
            color: #666;
            font-weight: 500;
            transition: color 0.3s;
            padding-bottom: 2px;
        }

        #nav-links a:hover, #nav-links a.active {
            color: #000;
            border-bottom: 2px solid #000;
        }

        /* Kandungan Utama (Layout 2 Column) */
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
            position: relative;
            z-index: 2; /* Letak atas nota muzik */
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            #nav-links { padding: 0; }
            #nav-links li { margin: 0 10px; }
            .content { grid-template-columns: 1fr; text-align: center; }
        }

        /* Animasi Piring Hitam (Vinyl) */
        .vinyl-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .vinyl {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, #3a3a3a 40%, #111 41%, #222 50%, #111 60%, #222 70%, #050505 100%);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            animation: spin 6s linear infinite; 
        }
